name: mva-procurement-uat

services:
  mysql:
    image: mysql:9.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-mva_procurement_uat}
      MYSQL_USER: ${DB_USER:-mva_uat_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mva_mysql_data:/var/lib/mysql
      - ../../procurement-prototype/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../procurement-prototype/db/migrations/001_target_workflow_tables.sql:/docker-entrypoint-initdb.d/02-target-workflow-tables.sql:ro
      - ../../procurement-prototype/db/seed-uat-users.sql:/docker-entrypoint-initdb.d/03-seed-uat-users.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 20s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../../procurement-prototype
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: uat
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-mva_procurement_uat}
      DB_USER: ${DB_USER:-mva_uat_app}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-12}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      UPLOAD_ROOT: /var/lib/mva-procurement/uploads
      SAP_PO_RAW_WORKBOOK_PATH: /var/lib/mva-procurement/imports/Source DB regularize_0608_renumbered.xlsx
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - mva_uploads:/var/lib/mva-procurement/uploads
      - ./imports:/var/lib/mva-procurement/imports:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||8080)+'/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mva_mysql_data:
  mva_uploads:
